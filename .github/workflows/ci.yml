name: CI

on:
  push:
    branches: [master]
  pull_request:

# A force-push or a quick follow-up commit makes the older run irrelevant;
# cancel it rather than paying for both. master is exempt so every landed
# commit keeps a complete result.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read

jobs:
  go:
    name: coordinator & CLI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          # Tracks go.mod rather than pinning a second copy of the version
          # that would drift from it.
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt reports unformatted files; run: gofmt -w $unformatted"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      # -count=1 disables the test cache: a cached pass from a previous run
      # would report success without executing anything.
      - name: test
        run: go test -count=1 ./...

  console:
    name: webui console
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webui/test/package-lock.json

      # npm ci installs exactly the locked tree and fails if package.json and
      # the lockfile disagree — which is the point of tracking the lockfile.
      - name: install
        run: npm --prefix webui/test ci

      - name: test
        run: make webui-test

  agent:
    name: agent
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libzstd-dev libssl-dev

      - name: build
        run: make -C agent

      # Unit tests that need no coordinator or fleet: glob matcher, metadata
      # fidelity, unbuffered copy, temp naming.
      - name: test
        run: make -C agent test

  e2e:
    # Each script drives a real coordinator + C agent against a real tree, so
    # these are the only tests that exercise the agent end to end. They need
    # io_uring and a filesystem carrying xattrs.
    #
    # Every script builds the binaries it needs itself (make -C agent, then
    # go build), so each leg carries both toolchains rather than being handed
    # prebuilt binaries — an artifact would just be rebuilt over.
    name: e2e
    # Not worth spinning a dozen legs until the code compiles and passes its
    # own unit tests.
    needs: [go, agent]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      # One broken script should not hide the state of the other eleven.
      fail-fast: false
      matrix:
        script:
          - e2e                    # full lifecycle: sync, converge, verify, gated delete
          - chunk_e2e              # cross-host chunk fan-out
          - chunk_abort_reclaim_e2e # abandoned chunk group is reclaimed
          - chunk_resilience_e2e   # agent dies mid-copy; leases expire and re-grant
          - deep_e2e               # directory chain deeper than the walker's in-agent limit
          - dirfix_e2e             # DIRFIX over a directory that fans out to entry-lists
          - fanout_e2e             # a small volume must still use the whole fleet
          - filter_e2e             # include/exclude filters
          - probe_e2e              # per-agent mount probe gates pass start
          - scale_e2e              # pathological shapes: huge dir, huge file
          - temp_reclaim_e2e       # sweep reclaims crash residue, spares live temps
          - tls_e2e                # mTLS, auth enforcement, reconnect-resume
          - ucopy_e2e              # io_uring copy path with server-side copy disabled
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # attr supplies setfattr/getfattr, which chunk_e2e and scale_e2e use to
      # seed and check xattrs. It is not present on the runners by default.
      - name: build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libzstd-dev libssl-dev attr

      - name: ${{ matrix.script }}
        run: bash test/${{ matrix.script }}.sh
